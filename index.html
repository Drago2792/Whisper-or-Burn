<!-- Firebase -->

  import {
    getFirestore, doc, setDoc, getDoc, onSnapshot,
    updateDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── PASTE YOUR FIREBASE CONFIG HERE ──
   const firebaseConfig = {
    apiKey: "AIzaSyC8jCKtY4xy6g-YlvfFgBYan1WbWXuFnx0",
    authDomain: "whisper-or-burn.firebaseapp.com",
    projectId: "whisper-or-burn",
    storageBucket: "whisper-or-burn.firebasestorage.app",
    messagingSenderId: "106963119422",
    appId: "1:106963119422:web:3acfc4d3861f5c5066106f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window._db = db;
  window._fs = { doc, setDoc, getDoc, onSnapshot, updateDoc, serverTimestamp };
  window._dbReady = true;
  document.dispatchEvent(new Event("db-ready"));
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #ff3c3c;
    --accent2: #ff8c00;
    --gold: #f5c842;
    --text: #e8e8e8;
    --muted: #666;
    --green: #3cffa0;
    --spy: #a855f7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  .screen { display: none; min-height: 100vh; position: relative; z-index: 1; }
  .screen.active { display: flex; flex-direction: column; }

  .game-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 8vw, 4rem);
    letter-spacing: 0.08em;
    line-height: 1;
  }
  .title-accent { color: var(--accent); }

  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 14px 28px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.2s;
    z-index: -1;
  }
  .btn:hover::before { transform: translateX(0); }
  .btn:hover { border-color: var(--accent); color: #fff; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary::before { background: #cc0000; }
  .btn.ghost { border-color: var(--muted); color: var(--muted); }
  .btn.green-btn { background: var(--green); border-color: var(--green); color: #000; }
  .btn.green-btn::before { background: #2dd682; }
  .btn.gold { background: var(--gold); border-color: var(--gold); color: #000; }
  .btn.gold::before { background: #d4a800; }
  .btn.spy-btn { background: var(--spy); border-color: var(--spy); color: #fff; font-size: 0.7rem; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn:disabled::before { display: none; }

  input, textarea {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  input::placeholder, textarea::placeholder { color: var(--muted); }

  .card { background: var(--surface); border: 1px solid var(--border); padding: 24px; }

  .tag {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid currentColor;
    display: inline-block;
  }
  .tag.red { color: var(--accent); }
  .tag.gold { color: var(--gold); }
  .tag.green { color: var(--green); }

  .timer-ring { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring .track { fill: none; stroke: var(--border); stroke-width: 4; }
  .timer-ring .progress { fill: none; stroke: var(--green); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.5s; }
  .timer-number {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    color: var(--accent);
  }

  .player-pill {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    border: 1px solid var(--border);
    background: var(--surface2);
    transition: all 0.15s;
  }
  .player-pill.clickable { cursor: pointer; }
  .player-pill.clickable:hover { border-color: var(--accent); }
  .player-pill.selected { border-color: var(--accent); background: rgba(255,60,60,0.1); }
  .player-pill .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .player-pill .dot.on { background: var(--green); }
  .player-pill .dot.off { background: var(--muted); }

  .chat-box {
    display: flex; flex-direction: column; gap: 8px;
    min-height: 100px; max-height: 220px;
    overflow-y: auto; padding: 12px;
    background: var(--surface2); border: 1px solid var(--border);
  }
  .chat-msg { font-size: 0.8rem; line-height: 1.5; padding: 8px 12px; border-left: 2px solid var(--border); }
  .chat-msg.mine { border-left-color: var(--accent); }
  .chat-msg .sender { color: var(--muted); font-size: 0.65rem; letter-spacing: 0.1em; margin-bottom: 3px; }

  .confession-card {
    background: var(--surface2); border: 1px solid var(--border);
    padding: 16px; cursor: pointer; transition: all 0.2s; position: relative;
  }
  .confession-card:hover { border-color: var(--gold); }
  .confession-card.voted { border-color: var(--gold); background: rgba(245,200,66,0.05); }
  .confession-card .vote-count {
    position: absolute; top: 12px; right: 12px;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--gold);
  }

  .leak-banner {
    background: var(--accent); color: #fff;
    padding: 12px 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem; letter-spacing: 0.1em;
    display: flex; align-items: center; gap: 10px;
  }

  .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 20px 0; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .pulse { animation: pulse 1.5s ease-in-out infinite; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .slide-up { animation: slideUp 0.35s ease both; }

  #screen-home { align-items: center; justify-content: center; padding: 40px 24px; gap: 32px; text-align: center; }
  #screen-lobby { padding: 24px; gap: 16px; }
  #screen-ready { padding: 24px; gap: 0; }
  #screen-game { padding: 16px; gap: 12px; }

  .home-tagline { font-size: 0.75rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }
  .section-label { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .room-code { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 0.3em; color: var(--accent); text-align: center; }

  .status-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; background: var(--surface); border: 1px solid var(--border);
    font-size: 0.7rem; letter-spacing: 0.1em;
  }
  .tokens-display { display: flex; gap: 4px; align-items: center; }
  .token-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--spy); transition: background 0.3s; }
  .token-dot.spent { background: var(--border); }

  .turn-indicator { text-align: center; padding: 16px; border: 1px solid var(--border); background: var(--surface); }
  .turn-big { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.05em; }

  .scroll-list { display: flex; flex-direction: column; gap: 6px; }

  .dare-screen {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px; text-align: center; padding: 32px;
  }
  .dare-big { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2rem, 10vw, 3.5rem); letter-spacing: 0.1em; color: var(--accent2); line-height: 1.1; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    z-index: 100; display: none; align-items: center; justify-content: center; padding: 24px;
  }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); padding: 28px; width: 100%; max-width: 420px; animation: slideUp 0.3s ease both; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.08em; margin-bottom: 16px; }

  .spy-watching {
    position: fixed; bottom: 16px; right: 16px;
    background: rgba(168,85,247,0.15); border: 1px solid var(--spy);
    padding: 8px 14px; font-size: 0.65rem; letter-spacing: 0.15em;
    color: var(--spy); text-transform: uppercase; z-index: 50; display: none;
  }
  .spy-watching.show { display: block; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>

</head>
<body>

<!-- ══ HOME ══ -->

<div id="screen-home" class="screen active">
  <div>
    <div class="home-tagline">a party game of secrets</div>
    <div class="game-title">WHISPER<br><span class="title-accent">OR BURN</span></div>

<div id="screen-game" class="screen">
  <div class="status-bar">

      <span style="color:var(--muted)">TURN </span>

<script>
// ══════════════════════════
// STATE
// ══════════════════════════
let db, fs;
let myId = '';
let myName = '';
let roomId = '';
let isHost = false;
let gameState = null;
let unsubRoom = null;
let timerInterval = null;

// ══════════════════════════
// INIT + SESSION RESTORE
// ══════════════════════════
document.addEventListener('db-ready', () => {
  db = window._db;
  fs = window._fs;
  tryRestoreSession();
});

function waitDb() {
  return new Promise(res => {
    if (window._dbReady) { db = window._db; fs = window._fs; res(); }
    else document.addEventListener('db-ready', () => { db = window._db; fs = window._fs; res(); });
  });
}

function saveSession() {
  localStorage.setItem('wob_session', JSON.stringify({ myId, myName, roomId }));
}

function clearSession() {
  localStorage.removeItem('wob_session');
}

async function tryRestoreSession() {
  const raw = localStorage.getItem('wob_session');
  if (!raw) return;
  try {
    const s = JSON.parse(raw);
    if (!s.myId || !s.roomId) return;
    const snap = await fs.getDoc(fs.doc(db, 'rooms', s.roomId));
    if (!snap.exists()) { clearSession(); return; }
    const data = snap.data();
    if (!data.players?.[s.myId]) { clearSession(); return; }
    if (data.phase === 'ended') { clearSession(); return; }
    myId = s.myId;
    myName = s.myName;
    roomId = s.roomId;
    isHost = data.host === myId;
    subscribeRoom();
    const ph = data.phase;
    if (ph === 'lobby') showScreen('lobby');
    else if (ph === 'ready') showScreen('ready');
    else showScreen('game');
  } catch(e) { clearSession(); }
}

// ══════════════════════════
// SCREENS
// ══════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

// ══════════════════════════
// HOME
// ══════════════════════════
async function hostGame() {
  myName = document.getElementById('home-name').value.trim();
  if (!myName) return alert('Enter your name first');
  await waitDb();
  myId = 'p_' + Math.random().toString(36).substr(2,8);
  roomId = Math.random().toString(36).substr(2,6).toUpperCase();
  isHost = true;
  await fs.setDoc(fs.doc(db, 'rooms', roomId), {
    phase: 'lobby', host: myId,
    players: { [myId]: { name: myName, tokens: 2, id: myId } },
    readyPlayers: [], turnCount: 0, timerSeconds: 120,
    confessionPool: [], usedConfessionIds: [], currentSpies: [],
    chatMessages: [], createdAt: fs.serverTimestamp()
  });
  saveSession();
  subscribeRoom();
  showLobby();
}

async function joinGame() {
  myName = document.getElementById('home-name').value.trim();
  const code = document.getElementById('home-code').value.trim().toUpperCase();
  if (!myName) return alert('Enter your name first');
  if (!code) return alert('Enter a room code');
  await waitDb();
  myId = 'p_' + Math.random().toString(36).substr(2,8);
  roomId = code;
  isHost = false;
  const snap = await fs.getDoc(fs.doc(db, 'rooms', roomId));
  if (!snap.exists()) return alert('Room not found');
  if (snap.data().phase !== 'lobby') return alert('Game already started');
  const players = { ...snap.data().players };
  players[myId] = { name: myName, tokens: 2, id: myId };
  await fs.updateDoc(fs.doc(db, 'rooms', roomId), { players });
  saveSession();
  subscribeRoom();
  showLobby();
}

function showLobby() {
  showScreen('lobby');
  document.getElementById('lobby-code').textContent = roomId;
}

// ══════════════════════════
// LEAVE ROOM
// ══════════════════════════
async function leaveRoom() {
  if (!roomId) { clearSession(); location.reload(); return; }
  try {
    const snap = await fs.getDoc(fs.doc(db, 'rooms', roomId));
    if (snap.exists()) {
      const data = snap.data();
      const players = { ...data.players };
      delete players[myId];
      const remaining = Object.keys(players);
      if (remaining.length === 0) {
        await fs.updateDoc(fs.doc(db, 'rooms', roomId), { phase: 'ended' });
      } else if (data.host === myId) {
        await fs.updateDoc(fs.doc(db, 'rooms', roomId), { players, host: remaining[0] });
      } else {
        await fs.updateDoc(fs.doc(db, 'rooms', roomId), { players });
      }
    }
  } catch(e) {}
  if (unsubRoom) { unsubRoom(); unsubRoom = null; }
  clearSession();
  location.reload();
}

// ══════════════════════════
// SUBSCRIPTION
// ══════════════════════════
function subscribeRoom() {
  if (unsubRoom) unsubRoom();
  unsubRoom = fs.onSnapshot(fs.doc(db, 'rooms', roomId), snap => {
    if (!snap.exists()) return;
    gameState = snap.data();
    isHost = gameState.host === myId;
    renderState();
  });
}

// ══════════════════════════
// RENDER ROUTER
// ══════════════════════════
function renderState() {
  if (!gameState) return;
  const p = gameState.phase;
  if (p === 'lobby') { showScreen('lobby'); renderLobby(); }
  else if (p === 'ready') { showScreen('ready'); renderReady(); }
  else if (p === 'pick-target') { showScreen('game'); renderPickTarget(); updateStatusBar(); }
  else if (p === 'chat') { showScreen('game'); renderChat(); updateStatusBar(); }
  else if (p === 'leaked-reveal') { showScreen('game'); renderLeakedReveal(); updateStatusBar(); }
  else if (p === 'confession') { showScreen('game'); renderConfession(); updateStatusBar(); }
  else if (p === 'dare') { showScreen('game'); renderDare(); updateStatusBar(); }
  else if (p === 'ended') { renderEnded(); }
}

function updateStatusBar() {
  document.getElementById('status-turn').textContent = gameState.turnCount || 1;
  document.getElementById('status-pool').textContent = (gameState.confessionPool || []).length;
  renderTokens();
  const hew = document.getElementById('host-end-wrap');
  if (hew) hew.style.display = isHost ? 'block' : 'none';
}

// ══════════════════════════
// LOBBY
// ══════════════════════════
function renderLobby() {
  document.getElementById('lobby-code').textContent = roomId;
  const players = Object.values(gameState.players || {});
  document.getElementById('lobby-players').innerHTML = players.map(p =>
    `<div class="player-pill slide-up">
      <div class="dot on"></div>
      <span>${p.name}</span>
      ${p.id === gameState.host ? '<span class="tag gold" style="margin-left:auto;font-size:0.55rem">HOST</span>' : ''}
    </div>`
  ).join('');
  document.getElementById('lobby-host-badge').style.display = isHost ? 'inline-block' : 'none';
  document.getElementById('lobby-host-controls').style.display = isHost ? 'flex' : 'none';
  document.getElementById('lobby-waiting').style.display = isHost ? 'none' : 'block';
}

function updateTimerLabel(val) {
  const m = Math.floor(val/60), s = val%60;
  document.getElementById('timer-label').textContent = m + ':' + String(s).padStart(2,'0');
}

async function hostStartGame() {
  const players = Object.keys(gameState.players || {});
  if (players.length < 2) return alert('Need at least 2 players');
  const timerSeconds = parseInt(document.getElementById('timer-slider')?.value || 120);
  await fs.updateDoc(fs.doc(db, 'rooms', roomId), { phase: 'ready', timerSeconds, readyPlayers: [] });
}

// ══════════════════════════
// READY PHASE
// ══════════════════════════
function renderReady() {
  const players = Object.values(gameState.players || {});
  const ready = gameState.readyPlayers || [];
  const myReady = ready.includes(myId);

  document.getElementById('ready-players').innerHTML = players.map(p =>
    `<div class="player-pill slide-up">
      <div class="dot ${ready.includes(p.id) ? 'on' : 'off'}"></div>
      <span>${p.name}</span>
      <span style="margin-left:auto;font-size:0.65rem;color:${ready.includes(p.id) ? 'var(--green)' : 'var(--muted)'}">
        ${ready.includes(p.id) ? 'READY ✓' : 'waiting…'}
      </span>
    </div>`
  ).join('');

  const btn = document.getElementById('ready-btn');
  if (btn) { btn.textContent = myReady ? "READY ✓" : "I'M READY"; btn.disabled = myReady; }

  if (isHost && ready.length >= players.length && players.length >= 2) {
    beginGame();
  }
}

async function pressReady() {
  const ready = gameState.readyPlayers || [];
  if (ready.includes(myId)) return;
  await fs.updateDoc(fs.doc(db, 'rooms', roomId), { readyPlayers: [...ready, myId] });
}

async function beginGame() {
  const players = Object.keys(gameState.players || {});
  const turnPlayerId = players[Math.floor(Math.random() * players.length)];
  await fs.updateDoc(fs.doc(db, 'rooms', roomId), {
    phase: 'pick-target', turnPlayerId,
    turnCount: 1, confessionPool: [], usedConfessionIds: [], currentSpies: []
  });
}

// ══════════════════════════
// TOKENS
// ══════════════════════════
function renderTokens() {
  const tokens = gameState.players?.[myId]?.tokens ?? 2;
  const el = document.getElementById('spy-tokens-display');
  if (!el) return;
  el.innerHTML = [0,1].map(i => `<div class="token-dot ${i >= tokens ? 'spent' : ''}"></div>`).join('');
}

// ══════════════════════════
// PICK TARGET
// ══════════════════════════
let selectedTargetId = null;

function renderPickTarget() {
  const isTurnPlayer = gameState.turnPlayerId === myId;
  const turnPlayer = gameState.players?.[gameState.turnPlayerId];
  const others = Object.values(gameState.players || {}).filter(p => p.id !== gameState.turnPlayerId);

  let html = `<div class="turn-indicator slide-up">
    <div style="color:var(--muted);font-size:0.65rem;letter-spacing:0.15em;margin-bottom:4px">TURN PLAYER</div>
    <div class="turn-big">${turnPlayer?.name || '?'}</div>
    ${isTurnPlayer ? '<div style="color:var(--accent);font-size:0.7rem;margin-top:6px">that\'s you — pick the target</div>' : ''}
  </div>`;

  if (isTurnPlayer) {
    html += `<div>
      <div class="section-label">group's pick — tap to select</div>
      <div class="scroll-list">
      ${others.map(p => `<div class="player-pill clickable" onclick="selectTarget('${p.id}')" id="tpill-${p.id}">
        <div class="dot on"></div><span>${p.name}</span>
      </div>`).join('')}
      </div>
    </div>
    <button class="btn primary" style="width:100%;margin-top:auto" onclick="confirmTarget()" id="confirm-target-btn" disabled>CONFIRM TARGET</button>`;
  } else {
    html += `<div class="card" style="text-align:center">
      <div style="color:var(--muted);font-size:0.75rem;letter-spacing:0.1em">group is picking a target…</div>
      <div class="pulse" style="margin-top:12px;color:var(--accent);font-size:0.7rem">⬤ waiting</div>
    </div>`;
    const me = gameState.players?.[myId];
    if (me && me.tokens > 0) {
      html += `<button class="btn spy-btn" style="width:100%" onclick="useSpyToken()">👁 USE SPY TOKEN (${me.tokens} left)</button>`;
    }
  }
  document.getElementById('game-content').innerHTML = html;
  selectedTargetId = null;
}

function selectTarget(id) {
  selectedTargetId = id;
  document.querySelectorAll('[id^="tpill-"]').forEach(el => el.classList.remove('selected'));
  document.getElementById('tpill-' + id)?.classList.add('selected');
  document.getElementById('confirm-target-btn').disabled = false;
}

async function confirmTarget() {
  if (!selectedTargetId) return;
  await fs.updateDoc(fs.doc(db, 'rooms', roomId), {
    phase: 'chat', targetId: selectedTargetId,
    chatStartedAt: Date.now(),
    chatTimerSeconds: gameState.timerSeconds || 120,
    chatMessages: [], questionSent: false, answerSent: false,
    doneVotes: [], leaked: false
  });
  selectedTargetId = null;
}

// ══════════════════════════
// SPY TOKEN
// ══════════════════════════
async function useSpyToken() {
  const me = gameState.players?.[myId];
  if (!me || me.tokens <= 0) return;
  const players = { ...gameState.players };
  players[myId] = { ...me, tokens: me.tokens - 1 };
  const spies = [...(gameState.currentSpies || [])];
  if (!spies.includes(myId)) spies.push(myId);
  await fs.updateDoc(fs.doc(db, 'rooms', roomId), { players, currentSpies: spies });
  document.getElementById('spy-badge').classList.add('show');
  setTimeout(() => document.getElementById('spy-badge').classList.remove('show'), 4000);
}

// ══════════════════════════
// CHAT
// ══════════════════════════
function renderChat() {
  const isTurnPlayer = gameState.turnPlayerId === myId;
  const isTarget = gameState.targetId === myId;
  const isSpy = (gameState.currentSpies || []).includes(myId);
  const canSeeChat = isTurnPlayer || isTarget || isSpy;
  const turnPlayer = gameState.players?.[gameState.turnPlayerId];
  const target = gameState.players?.[gameState.targetId];

  const elapsed = (Date.now() - (gameState.chatStartedAt || Date.now())) / 1000;
  const total = gameState.chatTimerSeconds || 120;
  const timeLeft = Math.max(0, total - elapsed);
  const tlM = Math.floor(timeLeft/60), tlS = Math.floor(timeLeft%60);

  let html = `<div style="display:flex;align-items:center;justify-content:space-between">
    <div>
      <div style="color:var(--muted);font-size:0.65rem;letter-spacing:0.1em">PRIVATE EXCHANGE</div>
      <div style="font-size:0.85rem;margin-top:2px">${turnPlayer?.name} <span style="color:var(--muted)">→</span> ${target?.name}</div>
    </div>
    <div class="timer-ring">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle class="track" cx="40" cy="40" r="34"/>
        <circle class="progress" id="timer-progress" cx="40" cy="40" r="34"
          stroke-dasharray="${2*Math.PI*34}" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-number" id="timer-num">${tlM}:${String(tlS).padStart(2,'0')}</div>
    </div>
  </div>`;

  if (canSeeChat) {
    if (isSpy && !isTurnPlayer && !isTarget) {
      html += `<div style="background:rgba(168,85,247,0.1);border:1px solid var(--spy);padding:10px 16px;font-size:0.7rem;color:var(--spy);letter-spacing:0.1em">👁 WATCHING IN SECRET</div>`;
    }

    const messages = gameState.chatMessages || [];
    html += `<div class="chat-box" id="chat-box">
    ${messages.map(m => `<div class="chat-msg ${m.senderId===myId?'mine':''}">
      <div class="sender">${m.senderName}</div><div>${m.text}</div>
    </div>`).join('')}
    </div>`;

    if (isTurnPlayer || isTarget) {
      const canType = isTurnPlayer ? !gameState.questionSent : (gameState.questionSent && !gameState.answerSent);
      const ph = isTurnPlayer
        ? (gameState.questionSent ? 'question sent — waiting for answer…' : 'type your question…')
        : (gameState.questionSent ? 'type your answer…' : 'waiting for question…');

      html += `<div style="display:flex;gap:8px">
        <textarea id="chat-input" rows="2" placeholder="${ph}" ${!canType?'disabled':''} style="flex:1"></textarea>

```
    <button class="btn primary" onclick="sendChatMsg()" ${!canType?'disabled':''} style="padding:12px 16px;align-self:stretch">SEND</button>
  </div>`;

  const doneVotes = gameState.doneVotes || [];
  const myDone = doneVotes.includes(myId);
  html += `<button class="btn ghost" style="width:100%;font-size:0.7rem" onclick="voteDone()" ${myDone?'disabled':''}>
    ${myDone ? 'WAITING FOR OTHER PERSON…' : "WE'RE DONE — END EARLY"}
  </button>`;
}
```

} else {
html += `<div class="card" style="text-align:center;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px"> <div style="font-size:2rem">🔒</div> <div style="color:var(--muted);font-size:0.75rem;letter-spacing:0.1em">private exchange in progress</div> </div>`;
const me = gameState.players?.[myId];
if (me && me.tokens > 0) {
html += `<button class="btn spy-btn" style="width:100%" onclick="useSpyToken()">👁 SPY TOKEN — WATCH LIVE (${me.tokens} left)</button>`;
}
}

document.getElementById(‘game-content’).innerHTML = html;
startClientTimer(timeLeft);
const box = document.getElementById(‘chat-box’);
if (box) box.scrollTop = box.scrollHeight;

// Check if both voted done
const doneVotes = gameState.doneVotes || [];
if (isHost && doneVotes.includes(gameState.turnPlayerId) && doneVotes.includes(gameState.targetId)) {
wrapUpChat(false);
}
}

async function sendChatMsg() {
const input = document.getElementById(‘chat-input’);
const text = input?.value.trim();
if (!text) return;
const isTurnPlayer = gameState.turnPlayerId === myId;
const isTarget = gameState.targetId === myId;
const me = gameState.players?.[myId];
const messages = […(gameState.chatMessages||[]), { senderId:myId, senderName:me.name, text, ts:Date.now() }];
const updates = { chatMessages: messages };
if (isTurnPlayer) updates.questionSent = true;
if (isTarget) updates.answerSent = true;
await fs.updateDoc(fs.doc(db, ‘rooms’, roomId), updates);
if (input) input.value = ‘’;
if (isHost && updates.answerSent && gameState.questionSent) setTimeout(() => wrapUpChat(false), 800);
}

async function voteDone() {
const doneVotes = […(gameState.doneVotes||[])];
if (doneVotes.includes(myId)) return;
doneVotes.push(myId);
await fs.updateDoc(fs.doc(db, ‘rooms’, roomId), { doneVotes });
}

function startClientTimer(initialSeconds) {
if (timerInterval) clearInterval(timerInterval);
let s = Math.ceil(initialSeconds);
const circumference = 2 * Math.PI * 34;
const total = gameState.chatTimerSeconds || 120;

function tick() {
const numEl = document.getElementById(‘timer-num’);
const progEl = document.getElementById(‘timer-progress’);
if (!numEl) { clearInterval(timerInterval); return; }
const m = Math.floor(Math.max(0,s)/60), sec = Math.floor(Math.max(0,s)%60);
numEl.textContent = m + ‘:’ + String(sec).padStart(2,‘0’);
if (progEl) {
progEl.style.strokeDashoffset = circumference * (1 - s/total);
progEl.style.stroke = s <= 30 ? ‘#ff3c3c’ : s <= 60 ? ‘#ff8c00’ : ‘#3cffa0’;
}
if (s <= 0) { clearInterval(timerInterval); if (isHost) handleTimerExpiry(); }
s–;
}
tick();
timerInterval = setInterval(tick, 1000);
}

async function handleTimerExpiry() {
if (gameState.phase !== ‘chat’) return;
await wrapUpChat(true);
}

async function wrapUpChat(leaked) {
if (gameState.phase !== ‘chat’) return;
clearInterval(timerInterval);
const chatEntry = {
id: ‘chat_’ + Date.now(),
turnPlayerName: gameState.players?.[gameState.turnPlayerId]?.name || ‘?’,
targetName: gameState.players?.[gameState.targetId]?.name || ‘?’,
messages: gameState.chatMessages || [],
leaked
};
const pool = […(gameState.confessionPool||[]), chatEntry];
const newTurnCount = (gameState.turnCount||1) + 1;
const players = Object.keys(gameState.players||{});
const nextTurnPlayerId = players[((players.indexOf(gameState.turnPlayerId))+1) % players.length];
const shouldConfess = newTurnCount % 5 === 1 && pool.length >= 3;

if (leaked) {
await fs.updateDoc(fs.doc(db, ‘rooms’, roomId), {
phase: ‘leaked-reveal’, confessionPool: pool,
lastLeakedChat: chatEntry, nextTurnPlayerId,
turnCount: newTurnCount, currentSpies: []
});
setTimeout(async () => {
await fs.updateDoc(fs.doc(db, ‘rooms’, roomId), {
phase: shouldConfess ? ‘confession’ : ‘pick-target’,
turnPlayerId: nextTurnPlayerId,
…(shouldConfess ? buildConfessionState(pool, gameState.usedConfessionIds||[]) : {})
});
}, 3500);
} else {
await fs.updateDoc(fs.doc(db, ‘rooms’, roomId), {
phase: shouldConfess ? ‘confession’ : ‘pick-target’,
confessionPool: pool, turnPlayerId: nextTurnPlayerId,
turnCount: newTurnCount, currentSpies: [],
…(shouldConfess ? buildConfessionState(pool, gameState.usedConfessionIds||[]) : {})
});
}
}

function buildConfessionState(pool, usedIds) {
const available = pool.filter(c => !usedIds.includes(c.id)).sort(() => Math.random()-0.5);
const selected = available.slice(0,3);
const votes = {};
selected.forEach(c => votes[c.id] = []);
return {
confessionRound: { chats: selected, votes, resolved: false },
usedConfessionIds: […usedIds, …selected.map(c => c.id)]
};
}

// ══════════════════════════
// LEAKED REVEAL
// ══════════════════════════
function renderLeakedReveal() {
const msgs = (gameState.lastLeakedChat?.messages || []);
document.getElementById(‘game-content’).innerHTML = `<div class="leak-banner slide-up">🔥 TIME EXPIRED — CHAT LEAKED</div> <div class="card" style="flex:1"> <div class="section-label">exposed exchange</div> <div class="chat-box"> ${msgs.map(m =>`<div class="chat-msg"><div class="sender">${m.senderName}</div><div>${m.text}</div></div>`).join('')} </div> </div>`;
}

// ══════════════════════════
// CONFESSION
// ══════════════════════════
function renderConfession() {
const round = gameState.confessionRound;
if (!round) return;
const votes = round.votes || {};
const totalVoters = Object.keys(gameState.players||{}).length;
const totalVotes = Object.values(votes).reduce((sum,arr) => sum+arr.length, 0);

let html = `<div class="slide-up" style="text-align:center">
<div class="tag gold">CONFESSION ROUND</div>
<div style="color:var(--muted);font-size:0.7rem;margin-top:8px;letter-spacing:0.1em">vote for the juiciest exchange</div>

  </div>`;

(round.chats||[]).forEach((chat, idx) => {
const vc = (votes[chat.id]||[]).length;
const hasVoted = (votes[chat.id]||[]).includes(myId);
html += `<div class="confession-card slide-up ${hasVoted?'voted':''}" onclick="voteConfession('${chat.id}')"> <div class="vote-count">${vc}</div> <div class="tag" style="color:var(--muted);margin-bottom:10px">exchange ${idx+1}</div> <div class="chat-box" style="max-height:120px"> ${(chat.messages||[]).map(m=>`<div class="chat-msg"><div class="sender">???</div><div>${m.text}</div></div>`).join('')} </div> </div>`;
});

if (isHost && totalVotes >= totalVoters) {
html += `<button class="btn gold" style="width:100%" onclick="resolveConfession()">REVEAL THE JUICIEST 🔥</button>`;
} else {
html += `<div style="color:var(--muted);font-size:0.7rem;text-align:center;letter-spacing:0.1em">${totalVotes}/${totalVoters} voted</div>`;
}
document.getElementById(‘game-content’).innerHTML = html;
}

async function voteConfession(chatId) {
const votes = { …(gameState.confessionRound?.votes||{}) };
Object.keys(votes).forEach(id => { votes[id] = (votes[id]||[]).filter(v => v!==myId); });
votes[chatId] = […(votes[chatId]||[]), myId];
await fs.updateDoc(fs.doc(db, ‘rooms’, roomId), { ‘confessionRound.votes’: votes });
}

async function resolveConfession() {
const votes = gameState.confessionRound?.votes || {};
let maxV = -1, winnerId = null;
Object.entries(votes).forEach(([id,arr]) => { if(arr.length>maxV){maxV=arr.length;winnerId=id;} });
const winnerChat = (gameState.confessionRound?.chats||[]).find(c=>c.id===winnerId);
const allPlayers = Object.values(gameState.players||{});
const excluded = [winnerChat?.turnPlayerName, winnerChat?.targetName];
const eligible = allPlayers.filter(p=>!excluded.includes(p.name));
const pool = eligible.length>0 ? eligible : allPlayers;
const dareTarget = pool[Math.floor(Math.random()*pool.length)];
await fs.updateDoc(fs.doc(db, ‘rooms’, roomId), {
phase: ‘dare’,
dareRound: { winnerChat, dareTargetName: dareTarget.name, dareTargetId: dareTarget.id },
confessionRound: null
});
}

// ══════════════════════════
// DARE
// ══════════════════════════
function renderDare() {
const dare = gameState.dareRound;
if (!dare) return;
const msgs = dare.winnerChat?.messages || [];
let html = `<div class="dare-screen slide-up"> <div class="tag red">CONFESSION WINNER</div> <div class="card" style="width:100%;text-align:left"> <div style="margin-bottom:8px"> <span style="color:var(--accent)">${dare.winnerChat?.turnPlayerName}</span> <span style="color:var(--muted)"> × </span> <span style="color:var(--accent)">${dare.winnerChat?.targetName}</span> </div> <div class="chat-box" style="max-height:140px"> ${msgs.map(m=>`<div class="chat-msg"><div class="sender">${m.senderName}</div><div>${m.text}</div></div>`).join('')} </div> </div> <div> <div class="dare-big">DARE</div> <div style="color:var(--muted);font-size:0.75rem;letter-spacing:0.1em;margin-top:4px">assigned to</div> <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--accent2);letter-spacing:0.05em;margin-top:4px">${dare.dareTargetName}</div> </div> ${isHost ? `<button class="btn primary" style="width:100%;max-width:320px" onclick="continueAfterDare()">DARE DONE — CONTINUE</button>`:`<div style="color:var(--muted);font-size:0.7rem;letter-spacing:0.1em" class="pulse">waiting for host…</div>`}

  </div>`;
  document.getElementById('game-content').innerHTML = html;
}

async function continueAfterDare() {
await fs.updateDoc(fs.doc(db, ‘rooms’, roomId), { phase: ‘pick-target’, dareRound: null });
}

// ══════════════════════════
// ENDED
// ══════════════════════════
function renderEnded() {
showScreen(‘game’);
clearSession();
if (unsubRoom) { unsubRoom(); unsubRoom = null; }
document.getElementById(‘host-end-wrap’).style.display = ‘none’;
document.getElementById(‘game-content’).innerHTML = ` <div class="dare-screen"> <div class="game-title">GAME<br><span class="title-accent">OVER</span></div> <div style="color:var(--muted);font-size:0.75rem;letter-spacing:0.15em;text-align:center">thanks for playing whisper or burn</div> <button class="btn ghost" style="width:100%;max-width:280px" onclick="location.reload()">BACK TO HOME</button> </div>`;
}

// ══════════════════════════
// END GAME
// ══════════════════════════
function confirmEndGame() {
showModal(`<div class="modal-title">END THE GAME?</div> <div style="color:var(--muted);font-size:0.75rem;margin-bottom:20px">this will end it for everyone</div> <div style="display:flex;gap:10px"> <button class="btn primary" style="flex:1" onclick="endGame()">END IT</button> <button class="btn ghost" style="flex:1" onclick="closeModal()">CANCEL</button> </div>`);
}
async function endGame() {
closeModal();
await fs.updateDoc(fs.doc(db, ‘rooms’, roomId), { phase: ‘ended’ });
}

// ══════════════════════════
// MODAL
// ══════════════════════════
function showModal(html) { document.getElementById(‘modal-body’).innerHTML = html; document.getElementById(‘modal-overlay’).classList.add(‘open’); }
function closeModal() { document.getElementById(‘modal-overlay’).classList.remove(‘open’); }
</script>

</body>
</html>
